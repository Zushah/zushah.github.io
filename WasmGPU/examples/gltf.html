<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>WasmGPU glTF Example</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { background: #111; overflow: hidden; }
            canvas { display: block; width: 100vw; height: 100vh; }
        </style>
    </head>
    <body>
        <canvas></canvas>
        <script type="module">
            import { WasmGPU } from "https://cdn.jsdelivr.net/gh/Zushah/WasmGPU@0.6.0/dist/WasmGPU.min.js";
            const canvas = document.querySelector("canvas");
            const wgpu = await WasmGPU.create(canvas);

            // Scene, camera, and light
            const scene = wgpu.createScene([0, 0, 0]);
            const camera = wgpu.createCamera.perspective({ fov: 45, near: 0.1, far: 1000 });
            camera.transform.setPosition(0.5, 0.5, 0.5);
            camera.lookAt(0, 0, 0);
            scene.addLight(wgpu.createLight.directional({
                direction: [-1, -2, -1],
                color: [1, 1, 1],
                intensity: 5
            }));

            // glTF model
            const url = "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/ABeautifulGame/glTF-Binary/ABeautifulGame.glb";
            await wgpu.gltf.loadAndImport(url, { import: { targetScene: scene } });

            // Render
            wgpu.run((dt, time) => {
                const radius = 0.75;
                const speed = 0.5;
                const camX = Math.sin(time * speed) * radius;
                const camZ = Math.cos(time * speed) * radius;
                camera.transform.setPosition(camX, 0.5, camZ);
                camera.lookAt(0, 0, 0);
                wgpu.render(scene, camera);
            });
        </script>
    </body>
</html>
